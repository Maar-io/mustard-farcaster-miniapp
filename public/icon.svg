<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners for icon -->
  <defs>
    <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#icon-gradient)"/>

  <!-- Letter M - bold and centered -->
  <text x="256" y="380" font-family="Inter, system-ui, Arial, sans-serif" font-size="340" font-weight="900" fill="white" text-anchor="middle" opacity="0.98">
    M
  </text>
</svg>
