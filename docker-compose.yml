services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3300:3300"
    environment:
      - PORT=3300
      # host.docker.internal lets containers reach services on the host machine
      - MEYMAR_URL=http://host.docker.internal:3200
      - FRONTEND_URL=http://localhost:5174
    # Required for host.docker.internal on macOS/Windows (built-in)
    # For Linux, uncomment:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
